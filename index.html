<!DOCTYPE html>
<html lang="en">
<head>
    <title>jsFunctions&#128272;</title>      
    <meta charset="utf-8">
    <style>
        body {
            transition: transform 0.5s; /* Smooth transition for the rotation */
            background-color: red; 
              text-align: center; 
        }

        html {
            animation: adjustHue 20s alternate infinite;
        }

        @keyframes adjustHue {
            0% { filter: hue-rotate(360deg); }
        }

        h1 { color: coral !important; }
        h2 { color: pink !important; }
        h4 { color: green !important; }
       
    </style> 
</head>
<body>
<h3 id="h3" style="margin-top: 20px;"> 🖐  👀 </h3>
    <h1 id="demo">Some  CSS & js functions with test-button's.</h1>

   <div id="text"></div>
  <div id="btns">  
    <button onclick="mirrorPage()">Mirror Page</button> ... 
    <button onclick="spinnPage()">SpinnPage</button> ...
     <button onclick="MesseUP()">MessUP</button> ...
    <button onclick="rotate360Degrees()">360 Degrees</button> ....
     <button onclick="go_empty()">Go Empty </button> ...
    <button style="background-color: white;" onclick="freeze()">Freeze⚠️</button>
 </div>
 <hr id="hr">
  <img id="img1" src="vinkel.jpg">
    <img  id="img2" src="old.jpg" style=float:right>
    <script>
 //Mirror FUNTION
     function mirrorPage () {
            document.body.style.transform = "scaleX(-1)";
            setTimeout(function() {
   // Second mirror
                document.body.style.transform = "scaleX(1)";
            }, 500); 
   // Third mirror
            setTimeout(function() {
                document.body.style.transform = "scaleX(-1)";
            }, 1000);

            // Reload the page after 2 seconds from the start
            setTimeout(function() {
                location.reload(); // Reload the page after 2 seconds
            }, 2000);
        }
        
     //Spinn faste-and-faster FUNCTION 
  function spinnPage () {
document.documentElement.style.transitionDuration="5s";document.documentElement.style.transitionTimingFunction="ease-in";
document.documentElement.style.transform="rotate(3600deg)";
  }   
    
  function MesseUP () {
 alert("tomorrow");
}

   //Rotation-360 dgs FUNTION
 function rotate360Degrees () {
           
 // First rotation 1/3
            document.body.style.transform = "rotate(0deg)";
            setTimeout(function() {
                document.body.style.transform = "rotate(120deg)"; 
            }, 500); // 500 milliseconds
 // Secound rotation 2/3
            setTimeout(function() {
                document.body.style.transform = "rotate(240deg)"; 
            }, 1000); // 500ms after the first.
 // Third rotation 3/3 =360deg rotated.
            setTimeout(function() {
                document.body.style.transform = "rotate(360deg)";
            }, 1500); // 500ms after the second.

            // Reload the page after 2 seconds from the start
            setTimeout(function() {
                location.reload(); 
            }, 3000);        
         }
  
 //Running-Text-to-Empty FUNCTION
function go_empty () {

    let timePerLetter = 40,

function printOut(str) {

if(i < str.length)
   setTimeout(main, timePerLetter);
 else

  }, 2000);

}

 </script>
