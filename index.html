<script>
 //Mirror FUNTION
     function mirrorPage () {
            document.body.style.transform = "scaleX(-1)";
            setTimeout(function() {
   // Second mirror
                document.body.style.transform = "scaleX(1)";
            }, 500); 
   // Third mirror
            setTimeout(function() {
                document.body.style.transform = "scaleX(-1)";
            }, 1000);

            // Reload the page after 2 seconds from the start
            setTimeout(function() {
                location.reload(); 
            }, 2000);
        }
        
 //Spinn faste-and-faster FUNCTION 
  function spinnPage () {
document.documentElement.style.transitionDuration="5s";document.documentElement.style.transitionTimingFunction="ease-in";
document.documentElement.style.transform="rotate(3600deg)";
  }                

//Turn 180 and then a return-button-pop up.
function UPsideDown () {
    //  Upside-Down transformation
    ['', '-ms-', '-webkit-', '-o-', '-moz-'].forEach(function(prefix) {
        document.body.style[prefix + 'transition'] = 'transform 4s';
        document.body.style[prefix + 'transform'] = 'rotate(180deg)';
    });
 
     document.getElementById("resetImg").style.display="inline";
}
   
function resetPage () {
       // Reset the transformation
        ['', '-ms-', '-webkit-', '-o-', '-moz-'].forEach(function(prefix) {
            document.body.style[prefix + 'transform'] = 'rotate(0deg)';
        });
        document.getElementById("resetImg").style.display="none";
       //  document.getElementById("turnBtn").style.display="inline";
}
    document.getElementById("resetImg").style.display="none";
      
//A petty nice CSS color show :    
  function   ColorFlah () {
 window.location.href="color.html";
 }  
     
   //Rotation-360 dgs FUNTION
 function rotate360Degrees () {
           
 // First rotation 1/3
            document.body.style.transform = "rotate(0deg)";
            setTimeout(function() {
                document.body.style.transform = "rotate(120deg)"; 
            }, 500); // 500 milliseconds
 // Secound rotation 2/3
            setTimeout(function() {
                document.body.style.transform = "rotate(240deg)"; 
            }, 1000); // 500ms after the first.
 // Third rotation 3/3 =360deg rotated.
            setTimeout(function() {
                document.body.style.transform = "rotate(360deg)";
            }, 1500); // 500ms after the second.

            // Reload the page after 2 seconds from the start
            setTimeout(function() {
                location.reload(); 
            }, 3000);        
         }
